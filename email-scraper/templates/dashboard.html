<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Scraper Dashboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0e1a;
            --bg-card: #1a1f2e;
            --bg-hover: #252b3b;
            --border: #2d3748;
            --text: #f9fafb;
            --text-dim: #9ca3af;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }

        .header {
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header p {
            color: var(--text-dim);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .card:hover {
            border-color: var(--accent);
            transition: border-color 0.2s;
        }

        .stat-card {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .stat-info h3 {
            font-size: 13px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-info .value {
            font-size: 36px;
            font-weight: 700;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-purple { background: rgba(99, 102, 241, 0.1); color: var(--accent); }
        .icon-green { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .icon-yellow { background: rgba(245, 158, 11, 0.1); color: var(--warning); }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
        }

        .checkbox:hover {
            border-color: var(--accent);
        }

        .checkbox input {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge.running { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .badge.completed { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge.failed { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .badge.pending { background: rgba(245, 158, 11, 0.1); color: var(--warning); }

        .job-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }

        .job-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .job-meta {
            font-size: 13px;
            color: var(--text-dim);
        }

        .job-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 16px 0;
        }

        .job-stat {
            text-align: center;
            padding: 12px;
            background: var(--bg-hover);
            border-radius: 8px;
        }

        .job-stat-label {
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .job-stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        .logs {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            margin: 16px 0;
        }

        .log-line {
            margin-bottom: 4px;
            color: var(--text-dim);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 24px;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 8px;
        }

        .close-btn:hover {
            color: var(--text);
        }

        .empty-state {
            text-align: center;
            padding: 64px 32px;
            color: var(--text-dim);
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--bg-hover);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i data-lucide="mail" width="32" height="32"></i>
                Email Scraper Dashboard
            </h1>
            <p>Scrape and extract business emails at scale</p>
        </div>

        <div class="grid">
            <div class="card stat-card">
                <div class="stat-info">
                    <h3>Total Jobs</h3>
                    <div class="value" id="total-jobs">0</div>
                </div>
                <div class="stat-icon icon-purple">
                    <i data-lucide="briefcase" width="24" height="24"></i>
                </div>
            </div>

            <div class="card stat-card">
                <div class="stat-info">
                    <h3>Emails Found</h3>
                    <div class="value" id="total-emails">0</div>
                </div>
                <div class="stat-icon icon-green">
                    <i data-lucide="mail-check" width="24" height="24"></i>
                </div>
            </div>

            <div class="card stat-card">
                <div class="stat-info">
                    <h3>Active Jobs</h3>
                    <div class="value" id="active-jobs">0</div>
                </div>
                <div class="stat-icon icon-yellow">
                    <i data-lucide="activity" width="24" height="24"></i>
                </div>
            </div>
        </div>

        <div style="margin-bottom: 24px;">
            <button class="btn btn-primary" onclick="showNewJobModal()">
                <i data-lucide="plus" width="16" height="16"></i>
                New Job
            </button>
            <button class="btn btn-secondary" onclick="loadJobs()">
                <i data-lucide="refresh-cw" width="16" height="16"></i>
                Refresh
            </button>
        </div>

        <div id="jobs-list"></div>
    </div>

    <!-- New Job Modal -->
    <div class="modal" id="new-job-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Job</h2>
                <button class="close-btn" onclick="closeModal()">
                    <i data-lucide="x" width="24" height="24"></i>
                </button>
            </div>

            <form onsubmit="createJob(event)">
                <div class="form-group">
                    <label>Search Query *</label>
                    <input type="text" id="query" placeholder="e.g., dental clinics london" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Search Engine</label>
                        <select id="engine">
                            <option value="ddg">DuckDuckGo (Recommended)</option>
                            <option value="google">Google</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Backend</label>
                        <select id="backend">
                            <option value="scrapling">Scrapling (Fast)</option>
                            <option value="playwright">Playwright (JS-heavy)</option>
                        </select>
                    </div>
                </div>

                <div class="checkbox">
                    <input type="checkbox" id="check-mx" checked>
                    <label for="check-mx">Validate MX records (more accurate but slower)</label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;" id="create-btn">
                    <i data-lucide="play" width="16" height="16"></i>
                    Start Job
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let pollInterval = null;

        async function loadJobs() {
            try {
                const res = await fetch('/api/jobs');
                const data = await res.json();
                const jobs = data.jobs || [];

                // Update stats
                document.getElementById('total-jobs').textContent = jobs.length;
                document.getElementById('active-jobs').textContent = jobs.filter(j => j.status === 'running').length;
                
                const totalEmails = jobs.reduce((sum, j) => sum + (j.stats?.new_emails || 0), 0);
                document.getElementById('total-emails').textContent = totalEmails;

                // Render jobs
                const container = document.getElementById('jobs-list');
                
                if (jobs.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i data-lucide="inbox" width="64" height="64" style="margin: 0 auto 16px; opacity: 0.5;"></i><p>No jobs yet. Create your first job to get started!</p></div>';
                } else {
                    container.innerHTML = jobs.map(renderJob).join('');
                }

                lucide.createIcons();
            } catch (err) {
                console.error('Failed to load jobs:', err);
            }
        }

        function renderJob(job) {
            const stats = job.stats || {};
            const isActive = job.status === 'running';

            return `
                <div class="job-card">
                    <div class="job-header">
                        <div>
                            <div class="job-title">${job.query}</div>
                            <div class="job-meta">ID: ${job.id} • Created: ${new Date(job.created_at).toLocaleString()}</div>
                        </div>
                        <span class="badge ${job.status}">${job.status}</span>
                    </div>

                    <div class="job-stats">
                        <div class="job-stat">
                            <div class="job-stat-label">PAGES</div>
                            <div class="job-stat-value">${stats.pages_crawled || 0}</div>
                        </div>
                        <div class="job-stat">
                            <div class="job-stat-label">FOUND</div>
                            <div class="job-stat-value">${stats.new_emails || 0}</div>
                        </div>
                        <div class="job-stat">
                            <div class="job-stat-label">TOTAL</div>
                            <div class="job-stat-value">${stats.total_emails || 0}</div>
                        </div>
                        <div class="job-stat">
                            <div class="job-stat-label">RATE</div>
                            <div class="job-stat-value">${stats.rate_per_min > 0 ? stats.rate_per_min.toFixed(1) + '/m' : '—'}</div>
                        </div>
                    </div>

                    ${(job.logs && job.logs.length > 0) ? `
                        <div class="logs">
                            ${job.logs.slice(-10).map(log => `<div class="log-line">${log}</div>`).join('')}
                        </div>
                    ` : ''}

                    <div style="display: flex; gap: 8px; margin-top: 16px;">
                        ${job.status === 'completed' ? `
                            <button class="btn btn-success" onclick="downloadJob('${job.id}')">
                                <i data-lucide="download" width="16" height="16"></i>
                                Download CSV
                            </button>
                        ` : ''}
                        ${isActive ? `
                            <button class="btn btn-danger" onclick="stopJob('${job.id}')">
                                <i data-lucide="square" width="16" height="16"></i>
                                Stop
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function showNewJobModal() {
            document.getElementById('new-job-modal').classList.add('active');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('new-job-modal').classList.remove('active');
        }

        async function createJob(e) {
            e.preventDefault();

            const btn = document.getElementById('create-btn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Starting...';

            const data = {
                query: document.getElementById('query').value,
                engine: document.getElementById('engine').value,
                backend: document.getElementById('backend').value,
                check_mx: document.getElementById('check-mx').checked,
            };

            try {
                const res = await fetch('/api/jobs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!res.ok) throw new Error('Failed to create job');

                closeModal();
                loadJobs();
                startPolling();
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="play"></i> Start Job';
                lucide.createIcons();
            }
        }

        async function stopJob(jobId) {
            try {
                await fetch(`/api/jobs/${jobId}`, { method: 'DELETE' });
                loadJobs();
            } catch (err) {
                alert('Error stopping job: ' + err.message);
            }
        }

        async function downloadJob(jobId) {
            try {
                const res = await fetch(`/api/jobs/${jobId}/download`);
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `emails_${jobId}.csv`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch (err) {
                alert('Error downloading: ' + err.message);
            }
        }

        function startPolling() {
            if (pollInterval) return;
            pollInterval = setInterval(loadJobs, 2000);
        }

        function stopPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }

        // Initialize
        loadJobs();
        startPolling();

        // Cleanup
        window.addEventListener('beforeunload', stopPolling);
    </script>
</body>
</html>
